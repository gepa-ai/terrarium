# Cheap launcher smoke for optimize_anything compositions. This tests orchestration shape,
# not benchmark quality.
name: optimize_anything_composition_smoke
source_zshrc: true
max_workers: 1

tasks:
  - aime_math_mini

seeds: [0]

budget:
  max_evals: 8
  max_token_cost: 0.5

defaults:
  - max_concurrency=4
  - task.solver_lm=anthropic/claude-haiku-4-5
  - task.solver_temperature=0.0
  - task.solver_max_tokens=32000

algorithms:
  - name: seq_gepa_then_autoresearch
    algorithm: optimize_anything
    overrides:
      - adapter.strategy=sequential
      - "adapter.configs=[{engine: gepa, engine_config: {reflection: {reflection_lm: anthropic/claude-haiku-4-5}, engine: {seed: 0}}}, {engine: autoresearch, engine_config: {model: haiku}}]"

  - name: parallel_gepa_autoresearch_best_of
    algorithm: optimize_anything
    overrides:
      - adapter.strategy=best_of
      - "adapter.configs=[{engine: gepa, engine_config: {reflection: {reflection_lm: anthropic/claude-haiku-4-5}, engine: {seed: 0}}}, {engine: autoresearch, engine_config: {model: haiku}}]"
