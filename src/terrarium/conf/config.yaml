# Default terrarium run configuration.
#
# Override from the CLI:
#   python -m terrarium task=aime_math adapter=gepa budget.max_evals=200
#   python -m terrarium adapter=claude_code budget.max_token_cost=5.0
#   python -m terrarium budget.max_evals=200 budget.max_token_cost=10.0
#   python -m terrarium adapter.engine.max_workers=32
#   python -m terrarium tracking=wandb tracking.wandb_project=my-proj
#
# Or point at a custom adapter file:
#   python -m terrarium adapter=custom adapter.path=./my_adapter.py

defaults:
  - task: circle_packing
  - adapter: gepa
  - tracking: none
  - _self_

# Benchmark contract knobs.
# mode: null uses task.mode. Supported modes:
#   - single: one fixed objective, no dataset splits
#   - multi_task: visible dataset search, optional visible validation, no hidden test
#   - generalization: train/optional val during search, hidden test after search
# use_val: expose the validation split during search when the task has one.
benchmark:
  mode: null
  use_val: true

# Access policy for this benchmark condition. The sandbox/harness should
# enforce these fields where possible; the runner logs them in summary.json so
# results with incompatible access policies are not pooled accidentally.
access_policy:
  readable_paths: []
  writable_paths: []
  execution: sandboxed
  network: model_api_and_eval_server
  shared_cache: false
  prior_artifacts: false
  external_tools: []

# Budget limits. At least one must be set.
# max_evals: total number of eval calls allowed.
# max_token_cost: max USD spend on adapter LLM tokens
#   (GEPA â†’ max_reflection_cost, Claude Code â†’ --max-budget-usd).
budget:
  max_evals: 100
  max_token_cost: null

# Max parallel evaluations in the server.
max_concurrency: 8

# Extended-thinking / reasoning effort, shared by both adapters. One of
# ``low|medium|high|max`` (or null for the provider default). The runner
# threads this into whichever knob each adapter uses:
#   - ClaudeCodeAdapter: sets ``effort`` â†’ ``claude --effort <value>``
#   - GEPAAdapter: adds ``reasoning_effort: <value>`` to
#     ``reflection_lm_kwargs``, which litellm translates to Anthropic's
#     ``thinking={type: adaptive, ...}`` for Sonnet-4.6.
# Adapter-level overrides (adapter.effort=..., adapter.reflection_lm_kwargs=...)
# win over this top-level default.
effort: null

# Fixed thinking-token budget, shared across adapters. Mutually exclusive
# with ``effort`` â€” when both are set, max_thinking_tokens wins and effort
# is ignored. Disables adaptive reasoning and uses a fixed budget:
#   - ClaudeCodeAdapter / MetaHarnessAdapter: sets env vars
#     CLAUDE_CODE_DISABLE_ADAPTIVE_THINKING=1 and MAX_THINKING_TOKENS=<value>
#     on the subprocess (--effort is omitted).
#   - GEPAAdapter: passes ``thinking={"type": "enabled", "budget_tokens": <value>}``
#     to litellm (reasoning_effort is dropped).
# null = provider default (adaptive thinking on supported models).
# Adapter-level overrides (``adapter.max_thinking_tokens=...``) win.
#   python -m terrarium max_thinking_tokens=10000
max_thinking_tokens: null

# Sandbox all claude-code subprocesses (ClaudeCodeAdapter, MetaHarnessAdapter,
# and GEPA's ClaudeCodeReflectionProposer). When true, each spawned
# ``claude --print`` gets a ``--settings`` payload that:
#   - filesystem-sandboxes Bash (bubblewrap on Linux, Seatbelt on macOS)
#     so shell commands can't read/write outside the adapter's work_dir,
#   - denies Claude's file tools (Read/Edit/Write/...) access to
#     credentials / system paths via ``permissions.deny`` rules.
# See ``terrarium.sandbox`` for details. Adapter-level overrides
# (``adapter.sandbox=false``) win.
#   python -m terrarium sandbox=false
sandbox: false

# Early-stop threshold shared across adapters. When set, adapters terminate
# once the best score reaches/exceeds this value:
#   - GEPAAdapter: sets ``stop_at_score`` (callback raises BudgetExhausted)
#   - MetaHarnessAdapter: sets ``stop_at_score`` (checked after each benchmark)
#   - ClaudeCodeAdapter: already sees it in the task prompt.
# Adapter-level overrides (``adapter.stop_at_score=...``) win.
#   python -m terrarium perfect_score=100
perfect_score: null

# If set, write full result JSON (including best_candidate) to this path.
output: null

hydra:
  run:
    dir: outputs/terrarium/${task.name}/${hydra:runtime.choices.adapter}/${now:%Y-%m-%d_%H-%M-%S}
  job:
    chdir: false
