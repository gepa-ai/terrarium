# Default terrarium run configuration.
#
# Override from the CLI:
#   python -m terrarium task=aime_math adapter=gepa budget.max_evals=200
#   python -m terrarium adapter=claude_code budget.max_token_cost=5.0
#   python -m terrarium budget.max_evals=200 budget.max_token_cost=10.0
#   python -m terrarium adapter.engine.max_workers=32
#   python -m terrarium tracking=wandb tracking.wandb_project=my-proj
#
# Or point at a custom adapter file:
#   python -m terrarium adapter=custom adapter.path=./my_adapter.py

defaults:
  - task: circle_packing
  - adapter: gepa
  - tracking: none
  - _self_

# Budget limits. At least one must be set.
# max_evals: total number of eval calls allowed.
# max_token_cost: max USD spend on adapter LLM tokens
#   (GEPA → max_reflection_cost, Claude Code → --max-budget-usd).
budget:
  max_evals: 100
  max_token_cost: null

# Max parallel evaluations in the server.
max_concurrency: 8

# Extended-thinking / reasoning effort, shared by both adapters. One of
# ``low|medium|high|max`` (or null for the provider default). The runner
# threads this into whichever knob each adapter uses:
#   - ClaudeCodeAdapter: sets ``effort`` → ``claude --effort <value>``
#   - GEPAAdapter: adds ``reasoning_effort: <value>`` to
#     ``reflection_lm_kwargs``, which litellm translates to Anthropic's
#     ``thinking={type: adaptive, ...}`` for Sonnet-4.6.
# Adapter-level overrides (adapter.effort=..., adapter.reflection_lm_kwargs=...)
# win over this top-level default.
effort: null

# If set, write full result JSON (including best_candidate) to this path.
output: null

hydra:
  run:
    dir: outputs/terrarium/${task.name}/${hydra:runtime.choices.adapter}/${now:%Y-%m-%d_%H-%M-%S}
  job:
    chdir: false
