# @package adapter
#
# optimize_anything adapter — the primary terrarium adapter. Dispatches to any
# registered ``gepa.optimize_anything`` engine (``gepa`` / ``autoresearch`` /
# ``meta_harness`` / ``best_of_n``) via a single ``engine`` knob, or composes
# several into an ensemble via ``strategy`` + ``configs``.
#
# The native ``gepa`` / ``claude_code`` / ``meta_harness`` adapters are
# deprecated in favor of this one (``engine=gepa`` / ``engine=autoresearch`` /
# ``engine=meta_harness``).
#
# Single-engine usage (default):
#
#   python -m terrarium adapter.engine=gepa task=circle_packing
#   python -m terrarium adapter.engine=meta_harness budget.max_evals=200
#   python -m terrarium adapter.engine=autoresearch adapter.engine_config='{model: sonnet}'
#
# Engine-specific options go in the free-form ``engine_config`` mapping. Each
# engine pops the keys it understands and warns about the rest, so typos surface
# immediately:
#
#   adapter.engine_config.reflection.reflection_lm=openai/gpt-5   # gepa engine
#   adapter.engine_config.engine.max_workers=32                   # gepa engine
#   adapter.engine_config.model=sonnet                           # autoresearch engine
#   adapter.engine_config.max_iterations=10                       # meta_harness engine
#
# Ensemble usage — set ``strategy`` to one of ``sequential`` / ``parallel`` /
# ``best_of`` / ``vote`` and provide ``configs`` (list of per-engine
# overrides). Budget is pre-partitioned ``total // N`` per inner engine
# (sequential shares one pool instead). Examples:
#
#   python -m terrarium adapter.strategy=best_of \\
#     'adapter.configs=[{engine: gepa}, {engine: autoresearch, engine_config: {model: sonnet}}]' \\
#     budget.max_evals=200
#   python -m terrarium adapter.strategy=sequential \\
#     'adapter.configs=[{engine: gepa}, {engine: meta_harness}]' budget.max_evals=400

_target_: terrarium.adapters.optimize_anything_adapter.OptimizeAnythingAdapter

# Engine selector for the single-engine path. String maps via the
# gepa.optimize_anything engine registry; pass a constructed
# ``gepa.optimize_anything.Engine`` instance from Python instead of yaml if
# needed. Ignored when ``strategy != single``.
engine: gepa

# Free-form, engine-specific options for the single-engine path.
# Forwarded verbatim into ``OptimizeAnythingConfig.engine_config``; each engine
# consumes its own keys. Ignored when ``strategy != single`` — use per-entry
# ``engine_config`` inside ``configs``.
engine_config: {}

# Composition strategy. ``single`` (default) runs one engine (``engine`` /
# ``engine_config`` above). The rest compose multiple engines from ``configs``:
#   - ``sequential`` — chain stages; each best seeds the next. Budget is
#     partitioned ``total // N`` per stage.
#   - ``adaptive_sequential`` — run bounded slices, switch engine after a
#     score plateau, and keep feeding the best aggregate engine result forward.
#   - ``parallel``   — run N concurrently; budget partitioned ``total // N``.
#   - ``best_of``    — parallel + select highest in-search ``best_score``.
#   - ``vote``       — parallel + one re-score pass via terrarium's outer
#     server, select highest re-score.
strategy: single

# List of per-engine overrides for ensemble strategies. Each entry may carry
# ``engine``, ``engine_config``, ``effort``, ``max_thinking_tokens``,
# ``stop_at_score``, ``sandbox``, ``run_dir``, and ``split_train_val``.
# ``split_train_val`` lets GEPA-like stages keep a real validation split while
# agentic stages receive train+val merged, within the same sequential/parallel
# composition.
# Required when ``strategy != single``.
# Example: [{engine: gepa, engine_config: {reflection: {reflection_lm: openai/gpt-5}}},
#           {engine: autoresearch, engine_config: {model: sonnet}}]
configs: []

# Thread-pool size for parallel-family ensembles. Defaults to ``len(configs)``.
max_workers: null

# Scheduler settings for ``strategy=adaptive_sequential``. ``plateau_evals``
# bounds each engine slice. After ``patience`` non-improving slices and at
# least ``min_evals_per_stage`` evals for that engine, the scheduler rotates
# to the next config. ``cycle`` lets it keep rotating until the shared budget
# is exhausted; set false for a one-pass chain.
scheduler:
  plateau_evals: 100
  patience: 1
  min_evals_per_stage: 100
  improvement_epsilon: 0.0
  cycle: true
  max_switches: null

# Sequential-stage handoff. Default ``none`` preserves current behavior.
# ``mode: rich`` writes prior-stage eval JSON files under
# ``<run_dir>/handoff/`` and passes only manifest paths through the
# optimize_anything Task.metadata; full trace blobs are not embedded in metadata.
handoff:
  mode: none
  max_evals: 100
  max_eval_bytes: 2000000
  include_best_candidate: true

# Workspace for per-run engine artifacts (evals/, progress_log.jsonl,
# summary.json, sessions/, …). Left null — runner injects
# ``<hydra_run_dir>/optimize_anything/`` at run time.
run_dir: null

# Per-adapter token-cost cap. Usually null (use top-level
# ``budget.max_token_cost`` instead). Set here only if you need a cap that
# differs from the eval-server budget.
max_token_cost: null

# Whole-loop early-stop threshold. Runner threads top-level ``perfect_score``
# here when null.
stop_at_score: null

# ``claude --effort low|medium|high|max`` for engines that spawn Claude Code.
# Independent of ``max_thinking_tokens`` — both can be set together. Runner
# threads top-level ``effort`` here when null.
effort: null

# Fixed thinking-token budget. Independent of ``effort`` (both can be set
# together). Runner threads top-level ``max_thinking_tokens`` here when null.
max_thinking_tokens: null

# Sandbox subprocess engines in bwrap (Linux) / Seatbelt (macOS). Runner
# threads top-level ``sandbox`` here when null.
sandbox: null
