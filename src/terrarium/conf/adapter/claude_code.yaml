# @package adapter
_target_: terrarium.adapters.claude_code.ClaudeCodeAdapter
model: sonnet
max_turns: null
# Work dir for candidate/eval-script files. Runner injects
# <hydra_run_dir>/claude_code/ when null. Set to keep artifacts elsewhere.
run_dir: null
# ``claude --effort low|medium|high|max``. Controls extended-thinking budget.
# null = CLI default. Set per experiment to match the reflection LM's
# ``reasoning_effort`` for fair GEPA-vs-CC comparisons.
effort: null
# Early-stop threshold. When set, the program.md prompt tells the agent to
# stop once it reaches this score. The runner threads the top-level
# ``perfect_score`` here when the user hasn't set it explicitly.
stop_at_score: null
# Fixed thinking-token budget. When set, disables adaptive thinking and uses
# a fixed budget (env vars CLAUDE_CODE_DISABLE_ADAPTIVE_THINKING=1 and
# MAX_THINKING_TOKENS=<value>). null = adaptive (provider default).
# The runner threads the top-level ``max_thinking_tokens`` here.
max_thinking_tokens: null
# Ralph loop: when claude exits before the LLM/eval budget is out, resume
# the pinned session (``claude --resume <session_id>``) and keep iterating
# until the budget is exhausted. Off by default — single-shot otherwise.
ralph: false
# Hard cap on total claude invocations under the Ralph loop (incl. the
# initial run). Safety net only; the loop usually exits earlier when the
# budget is exhausted or claude declines to continue.
ralph_max_iterations: 50
