# @package adapter
_target_: terrarium.adapters.claude_code.ClaudeCodeAdapter
model: sonnet
max_turns: null
# Work dir for candidate/eval-script files. Runner injects
# <hydra_run_dir>/claude_code/ when null. Set to keep artifacts elsewhere.
run_dir: null
# ``claude --effort low|medium|high|max``. Controls extended-thinking budget.
# null = CLI default. Set per experiment to match the reflection LM's
# ``reasoning_effort`` for fair GEPA-vs-CC comparisons.
effort: null
# Early-stop threshold. When set, the program.md prompt tells the agent to
# stop once it reaches this score. The runner threads the top-level
# ``perfect_score`` here when the user hasn't set it explicitly.
stop_at_score: null
