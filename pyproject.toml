[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "terrarium"
version = "0.1.0"
description = "A benchmarking framework for evaluating AI-driven program synthesis and evolution systems"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
keywords = ["benchmarking", "program synthesis", "evolution", "AI", "GEPA"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.urls]
Homepage = "https://gepa-ai.github.io/gepa/"
Repository = "https://github.com/gepa-ai/terrarium"
"GEPA Project" = "https://github.com/gepa-ai/gepa"
